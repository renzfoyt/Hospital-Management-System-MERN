name: Keep Backend Alive

# Runs on a schedule to ping the Render backend before its 15-minute
# free-tier inactivity window elapses, so it never spins down. Also
# runnable manually via workflow_dispatch for on-demand testing.
on:
  schedule:
    - cron: "*/14 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" https://hospital-management-olivarez.onrender.com/api/health)
          echo "Health check responded with status: $response"
          if [ "$response" -ne 200 ]; then
            echo "::warning::Health check did not return 200 (got $response)"
          fi